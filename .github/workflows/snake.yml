name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: mr-ssc
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_isocalendar: yes
          plugin_activity: yes
          plugin_stars: yes
          plugin_followup: yes
          plugin_lines: yes
          plugin_traffic: yes
